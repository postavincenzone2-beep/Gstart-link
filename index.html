<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G-START LINK</title>

  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f5e6d3, #f7d9b9);
      color: #000;
      text-align: center;
      padding: 30px 20px; /* margine laterale di sicurezza */
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* TITOLO */
    h1 {
      font-size: clamp(40px, 10vw, 70px);
      margin-bottom: 45px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #1a1a1a;
      text-shadow: 0px 3px 6px rgba(0,0,0,0.2);
    }

    /* BOTTONI PERFETTAMENTE CENTRATI */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      width: 100%;
      max-width: 380px; /* limite per evitare che tocchi i bordi */
      margin: 22px auto;
      padding: 22px 20px;
      border-radius: 20px;
      font-size: clamp(20px, 5vw, 32px);
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-sizing: border-box;
    }

    .btn:hover {
      transform: scale(1.07);
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    .btn:active {
      transform: scale(0.92);
      box-shadow: 0 4px 10px rgba(0,0,0,0.20);
    }

    .tiktok {
      background: #000;
      border: 2px solid #000;
    }

    .instagram {
      background: linear-gradient(45deg, #feda75, #d62976, #962fbf, #4f5bd5);
      border: 2px solid #962fbf;
    }

    .shop {
      background: #1a1a1a;
      border: 2px solid #1a1a1a;
    }

    /* ICONE GRANDI MA PERFETTAMENTE PROPORZIONATE */
    .iconify {
      font-size: clamp(50px, 12vw, 90px);
      flex-shrink: 0; /* evita che si schiaccino */
    }
  </style>
</head>
<body>

  <h1>G‑START LINK</h1>

  <a class="btn tiktok" href="https://www.tiktok.com/@gstartshop" target="_blank">
    <span class="iconify" data-icon="simple-icons:tiktok"></span>
    TikTok
  </a>

  <a class="btn instagram" href="https://www.instagram.com/gstart.store/" target="_blank">
    <span class="iconify" data-icon="mdi:instagram"></span>
    Instagram
  </a>

  <a class="btn shop" href="https://gstartstore.it/" target="_blank">
    <span class="iconify" data-icon="mdi:cart"></span>
    Shop Online
  </a>

</body>
</html>
